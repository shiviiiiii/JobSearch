name: Job Search Automation

on:
  workflow_dispatch:        # Allows manual "Run" button
  schedule:
    - cron: '0 8 * * *'     # 🚀 Auto-runs every day at 8:00 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure all necessary libraries are installed
          pip install pandas requests gspread google-auth jobspy sentence-transformers torch geopy PyMuPDF

      - name: Run Scraper
        env:
          GOOGLE_SHEET_CREDENTIALS: ${{ secrets.GOOGLE_SHEET_CREDENTIALS }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python main_script.py

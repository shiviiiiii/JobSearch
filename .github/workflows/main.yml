name: Job Search Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # This is the speed fix! It caches your pip dependencies.
          cache: 'pip'

      - name: Install and Run
        env:
          GOOGLE_SHEET_CREDENTIALS: ${{ secrets.GOOGLE_SHEET_CREDENTIALS }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          python -m pip install --upgrade pip
          # We list them all here. The first time will take a few minutes, 
          # but every run after that will be super fast.
          pip install pandas requests gspread google-auth python-jobspy sentence-transformers torch geopy PyMuPDF
          
          python main_script.py

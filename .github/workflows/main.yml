name: Job Search Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run
        env:
          GOOGLE_SHEET_CREDENTIALS: ${{ secrets.GOOGLE_SHEET_CREDENTIALS }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          # 1. Upgrade pip
          python -m pip install --upgrade pip
          
          # 2. Install using the CORRECT package name for the 'jobspy' module
          python -m pip install python-jobspy pandas requests gspread google-auth sentence-transformers torch geopy PyMuPDF
          
          # 3. DIAGNOSTIC: List installed packages to be 100% sure
          python -m pip list | grep jobspy
          
          # 4. Run the script
          python main_script.py
